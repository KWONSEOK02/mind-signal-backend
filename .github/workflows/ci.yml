# .github/workflows/ci.yml
name: CI Workflow

on:
  push:
    branches: [ main, dev, 'feat/**', 'fix/**', 'docs/**', 'refactor/**' ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # GitHub Settings에서 'build-and-test'를 필수 체크 항목으로 등록해야 함
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # 저장소 코드를 가상 머신으로 가져옴

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # package.json engines: >=20.0.0 에 맞춰 노드 환경 설정함
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        # 프로젝트 의존성 패키지 설치함

      - name: Check Format
        run: npm run format:check
        # Prettier 포맷 규칙 준수 여부 검사함

      - name: Type check
        run: npm run typecheck
        # TypeScript 타입 오류 조기 발견함

      - name: Architecture check (depcruise)
        run: npm run depcruise
        continue-on-error: true
        # FSD 레이어 경계 위반 감지함 (advisory — ADR-005)

      - name: Run Lint
        run: npm run lint
        # ESLint를 통한 정적 코드 분석 수행함

      - name: Run Tests
        run: npm run test
        env:
          NODE_ENV: test
        # Jest를 사용한 유닛 테스트 실행함 (MongoDB·Redis 미연결 — 소스 파일 기반 테스트)

      - name: Build Project
        run: npm run build
        # TypeScript 컴파일 및 경로 별칭 변환 성공 여부 검증함 (tsc + tsc-alias)
